{% extends 'base.html' %}

{% block content %}
<div class="edit-container" style="max-width: 800px; margin: 50px auto; background: var(--card-gray); padding: 40px; border: 1px solid var(--accent-brown);">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-brown); font-size: 2.5rem;">Share a New Recipe</h2>
    <p style="color: var(--text-cream); margin-bottom: 30px;">Let the community taste your creations.</p>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="margin-top: 30px;">
            <button type="submit" class="survey-btn" style="padding: 15px 40px;">Publish Recipe</button>
            <a href="{% url 'home' %}" style="color: var(--text-cream); margin-left: 20px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
