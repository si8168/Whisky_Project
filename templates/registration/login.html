{% extends 'base.html' %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 100px auto; background: var(--card-gray); padding: 40px; border: 1px solid var(--accent-brown);">
    <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-brown); text-align: center;">Member Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="survey-btn" style="width: 100%;">Sign In</button>
    </form>
</div>
{% endblock %}
