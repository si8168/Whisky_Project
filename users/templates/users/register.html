{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper" style="min-height: 90vh; display: flex; align-items: center; justify-content: center; background: #121212; padding: 40px 20px;">
    
    <div class="auth-card" style="width: 100%; max-width: 500px; background: var(--card-gray); border-radius: 20px; border: 1px solid var(--accent-brown); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7);">
        
        <div style="padding: 40px 40px 20px; text-align: center;">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-brown); font-size: 2rem;">Join the Vault</h2>
            <p style="color: #888; font-size: 0.85rem; margin-top: 5px;">Start sharing your culinary heritage today.</p>
        </div>

        <form method="POST" style="padding: 20px 40px 40px;">
            {% csrf_token %}
            
            <div class="registration-form-fields">
                {{ form.as_p }}
            </div>

            <button type="submit" class="view-recipe-btn" style="width: 100%; padding: 15px; background: var(--accent-brown); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-family: 'Playfair Display', serif; margin-top: 20px;">
                Create Account
            </button>

            <div style="text-align: center; margin-top: 25px;">
                <p style="color: #888; font-size: 0.85rem;">Already a member? 
                    <a href="/login/" style="color: #fff; text-decoration: none; font-weight: bold;">Sign In</a>
                </p>
            </div>
        </form>
    </div>
</div>

<style>
    /* Styling the paragraphs and inputs inside as_p */
    .registration-form-fields p {
        margin-bottom: 20px;
        color: #888;
        font-size: 0.85rem;
    }
    
    .registration-form-fields label {
        display: block;
        color: var(--accent-brown);
        font-weight: bold;
        margin-bottom: 8px;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1px;
    }

    .registration-form-fields input {
        width: 100%;
        padding: 12px 15px;
        background: #222 !important;
        border: 1px solid #444 !important;
        border-radius: 8px !important;
        color: #fff !important;
        box-sizing: border-box;
    }

    .registration-form-fields input:focus {
        border-color: var(--accent-brown) !important;
        outline: none;
    }

    /* Help text styling (Django default password requirements) */
    .helptext {
        display: block;
        font-size: 0.7rem;
        color: #555;
        margin-top: 5px;
        line-height: 1.4;
    }
</style>
{% endblock %}
