{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper" style="min-height: 85vh; display: flex; align-items: center; justify-content: center; background: #121212; padding: 40px 20px;">
    
    <div class="auth-card" style="width: 100%; max-width: 450px; background: #1a1a1a; border-radius: 20px; border: 1px solid #333; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.7);">
        
        <div style="padding: 40px 40px 20px; text-align: center; border-bottom: 1px solid #333; background: rgba(0,0,0,0.2);">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--accent-brown); font-size: 2.2rem; margin: 0; letter-spacing: 2px;">Member Login</h2>
            <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">Welcome back to the vault.</p>
        </div>

        <form method="POST" style="padding: 40px;">
            {% csrf_token %}
            
            <div class="auth-form-fields">
                {{ form.as_p }}
            </div>

            <button type="submit" class="view-recipe-btn" style="width: 100%; padding: 15px; background: var(--accent-brown); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-family: 'Playfair Display', serif; margin-top: 10px;">
                Sign In
            </button>

            <div style="text-align: center; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
                <p style="color: #666; font-size: 0.85rem;">New to the kitchen? 
                    <a href="{% url 'register' %}" style="color: var(--accent-brown); text-decoration: none; font-weight: bold; margin-left: 5px;">Join the Vault</a>
                </p>
            </div>
        </form>
    </div>
</div>

<style>
    /* This target Django's auto-generated 'p' and 'input' tags */
    .auth-form-fields p {
        margin-bottom: 20px;
    }
    
    .auth-form-fields label {
        display: block;
        color: var(--accent-brown);
        font-weight: bold;
        margin-bottom: 8px;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1.5px;
    }

    .auth-form-fields input {
        width: 100%;
        padding: 12px 15px;
        background: #252525 !important; /* DARK BACKGROUND */
        border: 1px solid #444 !important;
        border-radius: 8px !important;
        color: #fff !important; /* WHITE TEXT */
        font-family: 'Poppins', sans-serif;
        box-sizing: border-box;
    }

    .auth-form-fields input:focus {
        border-color: var(--accent-brown) !important;
        outline: none;
    }
</style>
{% endblock %}
